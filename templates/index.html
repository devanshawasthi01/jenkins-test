<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection — BlazeFace ML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            color: #eaeaea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #00d4aa;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .video-container {
            border: 3px solid #00d4aa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.3);
            max-width: 720px;
            width: 100%;
        }

        .video-container img {
            width: 100%;
            display: block;
        }

        .status-bar {
            margin-top: 20px;
            padding: 10px 24px;
            background: #16213e;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #00d4aa;
            border: 1px solid #00d4aa44;
        }

        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00d4aa;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <h1>Face Detection</h1>
    <p class="subtitle">Powered by <strong style="color:#00d4aa">BlazeFace</strong> — Google's deep learning neural network &nbsp;|&nbsp; MediaPipe + Flask</p>
    <div style="margin-bottom:16px;display:flex;gap:10px;">
        <span style="background:#00d4aa22;border:1px solid #00d4aa55;border-radius:6px;padding:4px 12px;font-size:0.8rem;color:#00d4aa">ML Model</span>
        <span style="background:#00d4aa22;border:1px solid #00d4aa55;border-radius:6px;padding:4px 12px;font-size:0.8rem;color:#00d4aa">Real-time Inference</span>
        <span style="background:#00d4aa22;border:1px solid #00d4aa55;border-radius:6px;padding:4px 12px;font-size:0.8rem;color:#00d4aa">Confidence Score</span>
    </div>

    <div class="video-container">
        <img src="{{ url_for('video_feed') }}" alt="Live Camera Feed" />
    </div>

    <div class="status-bar">
        <span class="dot"></span> Camera is live — BlazeFace ML model detecting faces with confidence scores
    </div>
</body>
</html>
